worker_processes auto;
rtmp_auto_push on;

events {}

rtmp {
    server {
        listen 1935;
        listen [::]:1935 ipv6only=on;

        application live {
            live on;
            record off;

            # HLS output
            hls on;
            hls_path /tmp/hls;
            hls_fragment 6s;
            hls_playlist_length 60s;
            hls_sync 100ms;
            hls_type live;
            hls_cleanup on;
        }
    }
}

http {
    sendfile on;
    tcp_nopush on;
    directio 512;

    default_type application/octet-stream;

    server {
        listen 8080;

        # HLS streaming endpoint
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # Health check
        location /health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
